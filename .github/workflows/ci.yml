name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - v*
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore WhatsApp.Core.slnx

      - name: Verify formatting
        run: dotnet format WhatsApp.Core.slnx --verify-no-changes --verbosity diagnostic

      - name: Resolve package version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
              echo "Tag must be v{major}.{minor}.{patch} or v{major}.{minor}.{patch}-{prerelease}"
              exit 1
            fi
            echo "PACK_ARGS=/p:Version=${VERSION} /p:VersionSuffix=" >> "$GITHUB_ENV"
            echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          else
            echo "PACK_ARGS=" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: dotnet build WhatsApp.Core.slnx -c Release --no-restore ${{ env.PACK_ARGS }}

      - name: Test with coverage
        run: dotnet test WhatsApp.Core.slnx -c Release --no-build --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Pack
        run: |
          mkdir -p artifacts/packages
          dotnet pack src/WhatsApp.Core/WhatsApp.Core.csproj -c Release --no-build -o artifacts/packages ${{ env.PACK_ARGS }}
          dotnet pack src/WhatsApp.Core.AspNetCore/WhatsApp.Core.AspNetCore.csproj -c Release --no-build -o artifacts/packages ${{ env.PACK_ARGS }}
          dotnet pack src/WhatsApp.Core.Testing/WhatsApp.Core.Testing.csproj -c Release --no-build -o artifacts/packages ${{ env.PACK_ARGS }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*
          if-no-files-found: warn

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: nuget
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push "artifacts/packages/*.nupkg"
          --api-key "${{ steps.nuget.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          generate_release_notes: true
